# App
spring.application.name=smashlink

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smashlink
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080

#BASE URL
BASE_URL = https://smashlink.io/"

# JWT
jwt.secret=
jwt.expiry.ms=3600000

admin.registration.secret=smashlink-admin-secret-2026

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification thresholds
notification.hit.limit.threshold=10


# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache TTL
cache.url.ttl.minutes=30


rate.limit.requests=10
rate.limit.duration.minutes=1

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Logging pattern with trace/span IDs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [traceId=%X{traceId}] [spanId=%X{spanId}] %-5level %logger{36} - %msg%n
logging.level.com.smashlink=DEBUG